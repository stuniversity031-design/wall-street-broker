<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX CAPITAL — Professional Trading Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --gold:#c9a84c;--gold-light:#f0c96b;--gold-dim:#7a6030;
    --green:#00e676;--green-dim:#1b4332;--red:#ff3d3d;--red-dim:#4a0e0e;
    --bg0:#030508;--bg1:#070c14;--bg2:#0d1520;--bg3:#111d2e;--bg4:#16253d;
    --border:#1e3050;--border2:#2a4570;
    --text-primary:#e8eef8;--text-secondary:#7a9cc8;--text-muted:#3d5a7a;
    --accent:#1a6fff;--accent2:#0d4fc0;
    --ticker-h:36px;
  }

  body{font-family:'Inter',sans-serif;background:var(--bg0);color:var(--text-primary);overflow:hidden;height:100vh;display:flex;flex-direction:column;}

  .top-bar{height:48px;background:var(--bg1);border-bottom:1px solid var(--gold-dim);display:flex;align-items:center;padding:0 16px;gap:20px;flex-shrink:0;}
  .logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:20px;color:var(--gold);letter-spacing:3px;white-space:nowrap;}
  .logo span{color:var(--text-secondary);font-size:11px;font-weight:400;letter-spacing:1px;display:block;margin-top:-4px;}
  .market-status{display:flex;gap:6px;align-items:center;font-size:11px;color:var(--green);font-family:'Share Tech Mono',monospace;margin-left:auto;}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .top-indices{display:flex;gap:18px;font-family:'Share Tech Mono',monospace;font-size:11px;}
  .idx{display:flex;flex-direction:column;align-items:flex-start;}
  .idx-name{color:var(--text-muted);font-size:9px;letter-spacing:1px;}
  .idx-val{color:var(--text-primary);font-size:12px;}
  .idx-chg.up{color:var(--green);}
  .idx-chg.dn{color:var(--red);}
  .time-block{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--gold);text-align:right;}
  .time-sub{font-size:9px;color:var(--text-muted);letter-spacing:1px;}

  .ticker-wrap{height:var(--ticker-h);background:#050e1c;border-bottom:1px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center;}
  .ticker-inner{display:flex;animation:tickerScroll 60s linear infinite;white-space:nowrap;will-change:transform;}
  .ticker-inner:hover{animation-play-state:paused;}
  @keyframes tickerScroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  .tick{display:inline-flex;align-items:center;gap:6px;padding:0 20px;font-family:'Share Tech Mono',monospace;font-size:11px;border-right:1px solid var(--border);}
  .tick-sym{color:var(--gold);font-weight:700;}
  .tick-price{color:var(--text-primary);}
  .tick-chg.up{color:var(--green);}
  .tick-chg.dn{color:var(--red);}

  .main{display:grid;grid-template-columns:260px 1fr 240px;gap:0;flex:1;overflow:hidden;}

  .left-panel{background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .panel-head{padding:10px 14px 8px;border-bottom:1px solid var(--border);font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;color:var(--text-muted);display:flex;justify-content:space-between;align-items:center;}
  .panel-head .badge{background:var(--gold-dim);color:var(--gold);font-size:9px;padding:2px 6px;border-radius:2px;letter-spacing:1px;}
  .watchlist{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
  .wl-item{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid #0a1525;cursor:pointer;transition:background .15s;}
  .wl-item:hover,.wl-item.active{background:var(--bg3);}
  .wl-sym{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:var(--gold);min-width:52px;}
  .wl-name{font-size:10px;color:var(--text-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .wl-right{text-align:right;}
  .wl-price{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-primary);}
  .wl-chg{font-family:'Share Tech Mono',monospace;font-size:10px;}
  .wl-chg.up{color:var(--green);}
  .wl-chg.dn{color:var(--red);}
  .mini-bar{height:2px;background:var(--border);margin:2px 14px;border-radius:1px;overflow:hidden;}
  .mini-fill{height:100%;border-radius:1px;}
  .mini-fill.up{background:var(--green);}
  .mini-fill.dn{background:var(--red);}
  .sector-grid{padding:10px 14px;border-top:1px solid var(--border);}
  .sector-row{display:flex;justify-content:space-between;font-size:10px;padding:3px 0;align-items:center;}
  .sector-name{color:var(--text-muted);}
  .sector-bar-wrap{flex:1;height:4px;background:var(--border);margin:0 8px;border-radius:2px;}
  .sector-bar-fill{height:100%;border-radius:2px;}
  .sector-val{font-family:'Share Tech Mono',monospace;font-size:10px;min-width:40px;text-align:right;}

  .center-panel{display:flex;flex-direction:column;background:var(--bg0);overflow:hidden;}
  .chart-area{height:220px;background:var(--bg1);border-bottom:1px solid var(--border);position:relative;flex-shrink:0;}
  .chart-head{display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid var(--border);}
  .chart-sym{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);}
  .chart-price{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--text-primary);}
  .chart-chg{font-family:'Share Tech Mono',monospace;font-size:12px;}
  .chart-tabs{display:flex;gap:2px;margin-left:auto;}
  .chart-tab{padding:3px 10px;font-size:10px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;transition:.15s;}
  .chart-tab.active{background:var(--accent2);border-color:var(--accent);color:#fff;}
  canvas#sparkChart{width:100%;height:155px;display:block;}

  .strategy-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
  .strat-tab{padding:8px 16px;font-size:11px;font-family:'Rajdhani',sans-serif;letter-spacing:1.5px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;background:none;border-top:none;border-left:none;border-right:none;}
  .strat-tab.active{color:var(--gold);border-color:var(--gold);}

  .chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
  .msg{display:flex;gap:10px;max-width:92%;}
  .msg.broker{align-self:flex-start;}
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;}
  .msg.broker .msg-avatar{background:linear-gradient(135deg,#1a3a6e,#0d2247);border:1px solid var(--gold-dim);color:var(--gold);}
  .msg.user .msg-avatar{background:var(--bg4);border:1px solid var(--border2);color:var(--text-secondary);}
  .msg-bubble{background:var(--bg2);border:1px solid var(--border);border-radius:2px 10px 10px 10px;padding:10px 14px;font-size:12.5px;line-height:1.6;color:var(--text-primary);}
  .msg.user .msg-bubble{background:var(--bg3);border-color:var(--border2);border-radius:10px 2px 10px 10px;}
  .msg-bubble strong{color:var(--gold);font-weight:600;}
  .msg-bubble em{color:var(--text-secondary);font-style:normal;}

  .thinking{display:flex;gap:4px;align-items:center;padding:4px 0;}
  .thinking span{width:6px;height:6px;border-radius:50%;background:var(--gold-dim);animation:thdot .8s ease-in-out infinite;}
  .thinking span:nth-child(2){animation-delay:.15s;}
  .thinking span:nth-child(3){animation-delay:.3s;}
  @keyframes thdot{0%,80%,100%{transform:scale(.6);opacity:.3;}40%{transform:scale(1);opacity:1;}}

  .quick-btns{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px;border-top:1px solid var(--border);}
  .qbtn{padding:4px 10px;font-size:10px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;border:1px solid var(--border2);background:transparent;color:var(--text-secondary);cursor:pointer;border-radius:2px;transition:.15s;white-space:nowrap;}
  .qbtn:hover{background:var(--bg3);color:var(--gold);border-color:var(--gold-dim);}

  .chat-input-row{display:flex;gap:0;border-top:1px solid var(--border);background:var(--bg1);}
  .chat-input{flex:1;background:transparent;border:none;outline:none;padding:14px 16px;font-size:13px;color:var(--text-primary);font-family:'Inter',sans-serif;}
  .chat-input::placeholder{color:var(--text-muted);}
  .send-btn{padding:12px 20px;background:var(--accent2);border:none;border-left:1px solid var(--border);color:#fff;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:2px;font-size:12px;transition:.15s;}
  .send-btn:hover{background:var(--accent);}
  .send-btn:disabled{opacity:.4;cursor:not-allowed;}

  .right-panel{background:var(--bg1);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .risk-meter{padding:12px 14px;border-bottom:1px solid var(--border);}
  .risk-label{font-size:10px;color:var(--text-muted);letter-spacing:1.5px;margin-bottom:6px;}
  .risk-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:4px;}
  .risk-fill{height:100%;border-radius:3px;}
  .risk-val{font-family:'Share Tech Mono',monospace;font-size:11px;}
  .news-feed{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
  .news-item{padding:10px 14px;border-bottom:1px solid #0a1525;cursor:pointer;transition:.15s;}
  .news-item:hover{background:var(--bg2);}
  .news-src{font-size:9px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
  .news-hl{font-size:11px;color:var(--text-primary);line-height:1.4;margin-bottom:4px;}
  .news-sent{font-size:9px;padding:1px 5px;border-radius:2px;}
  .sent-bull{background:var(--green-dim);color:var(--green);}
  .sent-bear{background:var(--red-dim);color:var(--red);}
  .sent-neu{background:var(--bg4);color:var(--text-muted);}
  .portfolio-mini{padding:10px 14px;border-top:1px solid var(--border);}
  .port-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:11px;}
  .port-sym{font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold);}
  .port-alloc{color:var(--text-muted);}
  .port-pnl{font-family:'Share Tech Mono',monospace;font-size:10px;}
  .port-pnl.up{color:var(--green);}
  .port-pnl.dn{color:var(--red);}

  .scrollbar-custom::-webkit-scrollbar{width:4px;}
  .scrollbar-custom::-webkit-scrollbar-thumb{background:var(--border);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .msg{animation:fadeIn .2s ease;}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">APEX CAPITAL<span>PROFESSIONAL TRADING TERMINAL</span></div>
  <div class="top-indices" id="topIndices"></div>
  <div class="market-status">
    <div class="status-dot"></div>
    <span>MARKETS LIVE</span>
  </div>
  <div class="time-block">
    <div id="clock">--:--:--</div>
    <div class="time-sub">NYSE / EDT</div>
  </div>
</div>

<div class="ticker-wrap">
  <div class="ticker-inner" id="tickerInner"></div>
</div>

<div class="main">

  <div class="left-panel">
    <div class="panel-head">WATCHLIST <span class="badge">LIVE</span></div>
    <div class="watchlist scrollbar-custom" id="watchlist"></div>
    <div class="sector-grid">
      <div class="panel-head" style="padding:0 0 6px;border:none;">SECTOR HEAT</div>
      <div id="sectorGrid"></div>
    </div>
  </div>

  <div class="center-panel">
    <div class="chart-area">
      <div class="chart-head">
        <div class="chart-sym" id="chartSym">AAPL</div>
        <div>
          <div class="chart-price" id="chartPrice">$213.49</div>
          <div class="chart-chg up" id="chartChg">▲ +2.14 (+1.01%)</div>
        </div>
        <div class="chart-tabs">
          <button class="chart-tab active">1D</button>
          <button class="chart-tab">1W</button>
          <button class="chart-tab">1M</button>
          <button class="chart-tab">3M</button>
          <button class="chart-tab">1Y</button>
        </div>
      </div>
      <canvas id="sparkChart"></canvas>
    </div>

    <div class="strategy-tabs">
      <button class="strat-tab active" onclick="setTab(this,'general')">BROKER AI</button>
      <button class="strat-tab" onclick="setTab(this,'longterm')">LONG-TERM</button>
      <button class="strat-tab" onclick="setTab(this,'shortterm')">SHORT-TERM</button>
      <button class="strat-tab" onclick="setTab(this,'risk')">RISK MGT</button>
      <button class="strat-tab" onclick="setTab(this,'cycles')">MARKET CYCLES</button>
    </div>

    <div class="chat-container">
      <div class="chat-msgs scrollbar-custom" id="chatMsgs"></div>
      <div class="quick-btns" id="quickBtns"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" placeholder="Ask your broker anything... e.g. 'What's the best sector for the next 6 months?'" />
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">SEND ▶</button>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="panel-head">RISK MONITOR</div>
    <div class="risk-meter">
      <div class="risk-label">PORTFOLIO RISK LEVEL</div>
      <div class="risk-track"><div class="risk-fill" style="width:42%;background:linear-gradient(90deg,#00e676,#f0c96b);"></div></div>
      <div class="risk-val" style="color:var(--gold);">MODERATE · 42 / 100</div>
    </div>
    <div class="risk-meter" style="padding-top:0;">
      <div class="risk-label">MARKET VOLATILITY (VIX)</div>
      <div class="risk-track"><div class="risk-fill" style="width:28%;background:#1a6fff;"></div></div>
      <div class="risk-val" style="color:#4da6ff;">LOW-MED · VIX 17.3</div>
    </div>
    <div class="panel-head" style="margin-top:4px;">MARKET INTELLIGENCE</div>
    <div class="news-feed scrollbar-custom" id="newsFeed"></div>
    <div class="panel-head" style="margin-top:0;">PORTFOLIO SNAPSHOT</div>
    <div class="portfolio-mini" id="portfolioMini"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" onload="initApp()"></script>
<script>
const TICKERS=[
  {sym:'AAPL',name:'Apple Inc.',price:213.49,chg:+2.14,pct:+1.01},
  {sym:'MSFT',name:'Microsoft Corp.',price:441.82,chg:+5.33,pct:+1.22},
  {sym:'NVDA',name:'NVIDIA Corp.',price:134.67,chg:-2.88,pct:-2.09},
  {sym:'AMZN',name:'Amazon.com Inc.',price:198.45,chg:+3.10,pct:+1.59},
  {sym:'GOOGL',name:'Alphabet Inc.',price:176.22,chg:-0.91,pct:-0.51},
  {sym:'META',name:'Meta Platforms',price:592.14,chg:+8.47,pct:+1.45},
  {sym:'TSLA',name:'Tesla Inc.',price:241.83,chg:-4.22,pct:-1.72},
  {sym:'JPM',name:'JPMorgan Chase',price:248.57,chg:+1.82,pct:+0.74},
  {sym:'BRK.B',name:'Berkshire Hathaway',price:466.90,chg:+0.45,pct:+0.10},
  {sym:'V',name:'Visa Inc.',price:314.22,chg:+2.07,pct:+0.66},
  {sym:'UNH',name:'UnitedHealth Group',price:523.40,chg:-3.15,pct:-0.60},
  {sym:'XOM',name:'ExxonMobil Corp.',price:117.83,chg:+0.92,pct:+0.79},
];

const INDICES=[
  {name:'DOW',val:'42,841',chg:'+0.48%',up:true},
  {name:'S&P 500',val:'5,918',chg:'+0.63%',up:true},
  {name:'NASDAQ',val:'19,244',chg:'+0.81%',up:true},
  {name:'VIX',val:'17.3',chg:'-0.9',up:false},
];

const SECTORS=[
  {name:'Technology',val:+1.8},{name:'Healthcare',val:-0.4},
  {name:'Financials',val:+0.9},{name:'Energy',val:+0.6},
  {name:'Consumer Disc.',val:+1.2},{name:'Utilities',val:-0.2},{name:'Real Estate',val:-0.7},
];

const NEWS=[
  {src:'Bloomberg',hl:'Fed signals patient stance on rate cuts; inflation data remains key',sent:'bull'},
  {src:'Reuters',hl:'AI chip demand drives Nvidia supplier earnings to record highs',sent:'bull'},
  {src:'WSJ',hl:'Consumer confidence dips as housing affordability concerns persist',sent:'bear'},
  {src:'CNBC',hl:'S&P 500 nears all-time high as mega-cap tech leads broad rally',sent:'bull'},
  {src:'FT',hl:'China stimulus measures boost emerging market sentiment',sent:'bull'},
  {src:"Barron's",hl:'Rising oil inventories weigh on energy sector outlook',sent:'bear'},
  {src:'MarketWatch',hl:'Treasury yields flatten as bond market prices in soft landing',sent:'neu'},
  {src:'Seeking Alpha',hl:'Dividend aristocrats outperform amid market rotation signals',sent:'bull'},
];

const PORTFOLIO=[
  {sym:'AAPL',alloc:'24%',pnl:'+$4,820',up:true},
  {sym:'MSFT',alloc:'20%',pnl:'+$9,130',up:true},
  {sym:'NVDA',alloc:'18%',pnl:'+$22,440',up:true},
  {sym:'JPM',alloc:'15%',pnl:'+$2,100',up:true},
  {sym:'XOM',alloc:'12%',pnl:'-$340',up:false},
  {sym:'CASH',alloc:'11%',pnl:'—',up:true},
];

const TAB_PROMPTS={
  general:'You are Marcus Holt, a seasoned Wall Street stockbroker at Apex Capital with 20 years on the floor of the NYSE. Your tone is direct, sharp, and authoritative — like a partner who respects the client\'s intelligence. You give professional investment guidance covering stocks, ETFs, market cycles, diversification, risk management, and staying current with financial news. You use real financial terminology. Keep responses concise and punchy — bullet points when listing, bold key terms, no fluff. Never give generic advice. Always tie guidance to current market conditions. Avoid disclaimers unless critical.',
  longterm:'You are Marcus Holt at Apex Capital. Focus ONLY on long-term investment strategy (3–10+ year horizon). Discuss: compounding, buy-and-hold in quality companies, dividend reinvestment, sector diversification, dollar-cost averaging, economic moats, index funds vs. individual stocks, avoiding emotional selling. Be concrete. Reference real tickers and sectors. Tone: steady, confident, analytical.',
  shortterm:'You are Marcus Holt at Apex Capital. Focus ONLY on short-term trading strategies (days to months). Discuss: momentum plays, technical analysis (RSI, MACD, moving averages, support/resistance), options (covered calls, puts), earnings plays, sector rotation, catalyst-driven trades, cutting losses fast. Use real market terminology. Be tactical and specific. Tone: fast, decisive, no hesitation.',
  risk:'You are Marcus Holt at Apex Capital. Focus ONLY on risk management. Discuss: position sizing, stop-loss levels, portfolio diversification across sectors/geographies/asset classes, correlation risk, hedging with options or inverse ETFs, the importance of cash reserves, psychological risk (FOMO, panic selling), volatility (VIX) monitoring. Be disciplined. Tone: measured, serious, protective.',
  cycles:'You are Marcus Holt at Apex Capital. Focus ONLY on market cycles. Discuss: the four phases (accumulation, markup, distribution, markdown), how to identify where we are currently, which sectors rotate in and out at each phase, the role of interest rates and Fed policy in cycles, how to position for early vs. late cycle, leading vs. lagging indicators (yield curve, PMI, employment). Be educational and tie to current conditions. Tone: macro-thinker, strategic.',
};

const QUICK_QUESTIONS={
  general:['Best sectors right now?','How to diversify $50K?',"What's moving the market today?",'Bull or bear — where are we?','Top 3 long-term holds?'],
  longterm:['Best ETFs for 10 years?','How to start with $10K?','Dividend vs growth stocks?','When to rebalance?','Avoid these mistakes?'],
  shortterm:['Hot momentum plays?','How to read MACD?','Best options strategy now?','Earnings plays this week?','When to cut a loss?'],
  risk:['How much cash to hold?','Set stop-losses how?','Hedge against a crash?','Am I over-concentrated?','VIX is rising — what now?'],
  cycles:['What cycle phase are we in?','Which sectors lead recovery?','How does Fed rate affect cycles?','Yield curve signals explained?','Late cycle playbook?'],
};

let currentTab='general';
let chatHistory=[];
let activeWl=0;
let chartInstance=null;

function initIndices(){
  document.getElementById('topIndices').innerHTML=INDICES.map(i=>`
    <div class="idx">
      <div class="idx-name">${i.name}</div>
      <div class="idx-val">${i.val}</div>
      <div class="idx-chg ${i.up?'up':'dn'}">${i.chg}</div>
    </div>`).join('');
}

function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=
    [now.getHours(),now.getMinutes(),now.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
}
setInterval(updateClock,1000);updateClock();

function buildTicker(){
  const data=[...TICKERS,...TICKERS];
  document.getElementById('tickerInner').innerHTML=data.map(t=>`
    <div class="tick">
      <span class="tick-sym">${t.sym}</span>
      <span class="tick-price">$${t.price.toFixed(2)}</span>
      <span class="tick-chg ${t.chg>=0?'up':'dn'}">${t.chg>=0?'▲':'▼'} ${Math.abs(t.pct).toFixed(2)}%</span>
    </div>`).join('');
}

function buildWatchlist(){
  document.getElementById('watchlist').innerHTML=TICKERS.map((t,i)=>`
    <div class="wl-item ${i===activeWl?'active':''}" onclick="selectWl(${i})">
      <div class="wl-sym">${t.sym}</div>
      <div class="wl-name">${t.name}</div>
      <div class="wl-right">
        <div class="wl-price">$${t.price.toFixed(2)}</div>
        <div class="wl-chg ${t.chg>=0?'up':'dn'}">${t.chg>=0?'+':''}${t.pct.toFixed(2)}%</div>
      </div>
    </div>
    <div class="mini-bar"><div class="mini-fill ${t.chg>=0?'up':'dn'}" style="width:${Math.min(100,40+Math.abs(t.pct)*15)}%"></div></div>
  `).join('');
}

function selectWl(i){
  activeWl=i;
  const t=TICKERS[i];
  document.getElementById('chartSym').textContent=t.sym;
  document.getElementById('chartPrice').textContent='$'+t.price.toFixed(2);
  const el=document.getElementById('chartChg');
  el.textContent=(t.chg>=0?'▲ +':'▼ ')+Math.abs(t.chg).toFixed(2)+' ('+t.pct.toFixed(2)+'%)';
  el.className='chart-chg '+(t.chg>=0?'up':'dn');
  buildWatchlist();
  buildSparkChart(t);
}

function buildSectors(){
  document.getElementById('sectorGrid').innerHTML=SECTORS.map(s=>`
    <div class="sector-row">
      <span class="sector-name">${s.name}</span>
      <div class="sector-bar-wrap"><div class="sector-bar-fill" style="width:${50+s.val*15}%;background:${s.val>=0?'#00e676':'#ff3d3d'};"></div></div>
      <span class="sector-val" style="color:${s.val>=0?'#00e676':'#ff3d3d'}">${s.val>=0?'+':''}${s.val}%</span>
    </div>`).join('');
}

function buildSparkChart(ticker){
  const ctx=document.getElementById('sparkChart').getContext('2d');
  if(chartInstance)chartInstance.destroy();
  const pts=30;
  const base=ticker?ticker.price:213;
  const data=Array.from({length:pts},(_,i)=>parseFloat((base+(Math.random()-0.48)*(base*0.015)*(i+1)/5).toFixed(2)));
  data[pts-1]=ticker?ticker.price:base;
  const isUp=ticker?ticker.chg>=0:true;
  chartInstance=new Chart(ctx,{
    type:'line',
    data:{
      labels:Array.from({length:pts},(_,i)=>i),
      datasets:[{
        data,
        borderColor:isUp?'#00e676':'#ff3d3d',
        borderWidth:1.5,
        fill:true,
        backgroundColor:(c)=>{
          const g=c.chart.ctx.createLinearGradient(0,0,0,140);
          g.addColorStop(0,isUp?'rgba(0,230,118,0.15)':'rgba(255,61,61,0.12)');
          g.addColorStop(1,'rgba(0,0,0,0)');
          return g;
        },
        pointRadius:0,tension:0.4,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{
        x:{display:false},
        y:{display:true,position:'right',
          grid:{color:'rgba(30,48,80,0.5)'},
          ticks:{color:'#3d5a7a',font:{size:9},maxTicksLimit:4,callback:v=>'$'+v.toFixed(0)}}
      },
      animation:{duration:400}
    }
  });
}

function buildNews(){
  document.getElementById('newsFeed').innerHTML=NEWS.map(n=>`
    <div class="news-item">
      <div class="news-src">${n.src}</div>
      <div class="news-hl">${n.hl}</div>
      <span class="news-sent sent-${n.sent}">${n.sent==='bull'?'▲ BULLISH':n.sent==='bear'?'▼ BEARISH':'● NEUTRAL'}</span>
    </div>`).join('');
}

function buildPortfolio(){
  document.getElementById('portfolioMini').innerHTML=PORTFOLIO.map(p=>`
    <div class="port-row">
      <span class="port-sym">${p.sym}</span>
      <span class="port-alloc">${p.alloc}</span>
      <span class="port-pnl ${p.up?'up':'dn'}">${p.pnl}</span>
    </div>`).join('');
}

function setTab(el,tab){
  document.querySelectorAll('.strat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentTab=tab;
  chatHistory=[];
  document.getElementById('chatMsgs').innerHTML='';
  buildQuickBtns();
  const welcomes={
    general:'<strong>Marcus Holt — Apex Capital.</strong> I\'m your senior broker. Ask me anything about the markets, your portfolio, or strategy. I\'ll give you the unfiltered truth.',
    longterm:'Long-term desk activated. <strong>Patience is the most profitable trade you\'ll ever make.</strong> Let\'s build wealth that compounds. What\'s your time horizon and risk appetite?',
    shortterm:'Short-term trading mode. <strong>Speed, discipline, and conviction.</strong> No room for hesitation. What\'s your target — momentum, options, or catalyst plays?',
    risk:'Risk management console. <strong>Protecting capital is rule number one.</strong> Before we talk returns, let\'s talk downside. What\'s your current exposure?',
    cycles:'Market cycle analysis. <strong>Where you are in the cycle determines everything.</strong> Let\'s map the macro landscape and position accordingly.',
  };
  addMsg('broker',welcomes[tab]||welcomes.general);
}

function buildQuickBtns(){
  const qs=QUICK_QUESTIONS[currentTab]||QUICK_QUESTIONS.general;
  document.getElementById('quickBtns').innerHTML=qs.map(q=>
    `<button class="qbtn" onclick="quickAsk('${q.replace(/'/g,"\\\'")}')">${q}</button>`).join('');
}

function quickAsk(q){
  document.getElementById('chatInput').value=q;
  sendMessage();
}

function addMsg(role,html){
  const wrap=document.getElementById('chatMsgs');
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  div.innerHTML=`<div class="msg-avatar">${role==='broker'?'MH':'YOU'}</div><div class="msg-bubble">${html}</div>`;
  wrap.appendChild(div);
  wrap.scrollTop=wrap.scrollHeight;
  return div;
}

function addThinking(){
  const wrap=document.getElementById('chatMsgs');
  const div=document.createElement('div');
  div.className='msg broker';
  div.id='thinkingMsg';
  div.innerHTML=`<div class="msg-avatar">MH</div><div class="msg-bubble"><div class="thinking"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop=wrap.scrollHeight;
}

async function sendMessage(){
  const input=document.getElementById('chatInput');
  const btn=document.getElementById('sendBtn');
  const text=input.value.trim();
  if(!text)return;

  input.value='';
  btn.disabled=true;
  addMsg('user',text);
  chatHistory.push({role:'user',content:text});
  addThinking();

  const ct=TICKERS[activeWl];
  const ctx=`\n\nCURRENT MARKET CONTEXT:\n- Active stock: ${ct.sym} @ $${ct.price.toFixed(2)} (${ct.pct>=0?'+':''}${ct.pct.toFixed(2)}% today)\n- S&P 500: 5,918 (+0.63%) · NASDAQ: 19,244 (+0.81%) · VIX: 17.3\n- Top sector today: Technology (+1.8%)\n- Date: June 2026\n\nFormat with HTML: <strong> for key terms, • for bullet lists. Under 200 words. Be sharp and specific.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:(TAB_PROMPTS[currentTab]||TAB_PROMPTS.general)+ctx,
        messages:chatHistory,
      })
    });

    let data;
    try{ data=await res.json(); }
    catch(parseErr){
      document.getElementById('thinkingMsg')?.remove();
      addMsg('broker',`<strong>Parse error [HTTP ${res.status}]:</strong> Could not read response. ${parseErr.message}`);
      btn.disabled=false; return;
    }

    if(!res.ok || data.error){
      document.getElementById('thinkingMsg')?.remove();
      const msg=data?.error?.message||`HTTP ${res.status} ${res.statusText}`;
      addMsg('broker',`<strong>API Error:</strong> ${msg}`);
      btn.disabled=false; return;
    }

    const reply=data.content?.map(c=>c.type==='text'?c.text:'').filter(Boolean).join('');
    document.getElementById('thinkingMsg')?.remove();
    if(!reply){
      addMsg('broker','<strong>Empty response.</strong> The API returned no content. Please try again.');
      btn.disabled=false; return;
    }
    chatHistory.push({role:'assistant',content:reply});
    addMsg('broker',reply);

  }catch(e){
    document.getElementById('thinkingMsg')?.remove();
    addMsg('broker',`<strong>Fetch failed:</strong> ${e.message}`);
  }
  btn.disabled=false;
}

document.querySelectorAll('.chart-tab').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.chart-tab').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    buildSparkChart(TICKERS[activeWl]);
  });
});

document.getElementById('chatInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});

function driftPrices(){
  TICKERS.forEach(t=>{
    const drift=(Math.random()-0.495)*t.price*0.0003;
    t.price=parseFloat((t.price+drift).toFixed(2));
    t.chg=parseFloat((t.chg+drift).toFixed(2));
    t.pct=parseFloat(((t.chg/t.price)*100).toFixed(2));
  });
  buildWatchlist();
  buildTicker();
  const ct=TICKERS[activeWl];
  document.getElementById('chartPrice').textContent='$'+ct.price.toFixed(2);
  const el=document.getElementById('chartChg');
  el.textContent=(ct.chg>=0?'▲ +':'▼ ')+Math.abs(ct.chg).toFixed(2)+' ('+ct.pct.toFixed(2)+'%)';
  el.className='chart-chg '+(ct.chg>=0?'up':'dn');
}
setInterval(driftPrices,3000);

initIndices();

},200);
